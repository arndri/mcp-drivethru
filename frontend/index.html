<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Cepat — Drive Thru</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8231A;
    --red-dark: #B01A14;
    --yellow: #FFD02B;
    --yellow-dark: #E6B800;
    --cream: #FFF8EE;
    --dark: #1A1208;
    --dark2: #2D1F0E;
    --brown: #4A2E0A;
    --text-muted: #8B6E4E;
    --bubble-user: #E8231A;
    --bubble-bot: #2D1F0E;
    --border-radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(232,35,26,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(255,208,43,0.1) 0%, transparent 60%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.01) 40px,
        rgba(255,255,255,0.01) 41px
      );
    pointer-events: none;
    z-index: 0;
  }

  .app-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
    padding: 0;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .header::before {
    content: '';
    position: absolute;
    bottom: -20px;
    right: -20px;
    width: 120px;
    height: 120px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }

  .header-inner {
    padding: 16px 20px 14px;
    position: relative;
    z-index: 1;
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--yellow);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .brand-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }

  .brand-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-left: 2px;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--yellow);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .status-text {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
  }

  /* Name bar */
  .name-bar {
    background: var(--dark2);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .name-bar label {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    font-weight: 500;
  }

  .name-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 12px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .name-input:focus {
    border-color: var(--yellow);
  }

  .name-input::placeholder { color: rgba(255,255,255,0.3); }

  /* Quick menu button */
  .menu-toggle-btn {
    background: var(--yellow);
    color: var(--dark);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s, transform 0.1s;
  }
  .menu-toggle-btn:hover { background: var(--yellow-dark); }
  .menu-toggle-btn:active { transform: scale(0.97); }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* Messages */
  .msg {
    display: flex;
    gap: 8px;
    animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot .msg-avatar {
    background: var(--yellow);
  }

  .msg.user .msg-avatar {
    background: var(--red);
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
  }

  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: var(--border-radius);
    font-size: 14px;
    line-height: 1.55;
    position: relative;
  }

  .msg.bot .msg-bubble {
    background: var(--bubble-bot);
    color: rgba(255,255,255,0.9);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .msg.user .msg-bubble {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    padding: 0 4px;
  }

  .msg.user .msg-time { text-align: right; }

  /* Order confirmation card */
  .order-card {
    background: linear-gradient(135deg, #1a2e1a, #0d2010);
    border: 1px solid rgba(74, 222, 74, 0.3);
    border-radius: 14px;
    padding: 14px 16px;
    margin-top: 8px;
    animation: cardSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes cardSlide {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .order-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .order-badge {
    background: #22c55e;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .order-code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: #22c55e;
    letter-spacing: 2px;
  }

  .order-detail {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .order-total {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
  }

  .order-total span:last-child { color: var(--yellow); }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: var(--bubble-bot);
    border-radius: var(--border-radius);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Quick order chips */
  .quick-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0;
  }

  .chip {
    background: rgba(255,208,43,0.12);
    border: 1px solid rgba(255,208,43,0.3);
    color: var(--yellow);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .chip:hover {
    background: rgba(255,208,43,0.25);
    border-color: var(--yellow);
  }

  /* Input area */
  .input-area {
    background: var(--dark2);
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 22px;
    padding: 10px 16px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }

  .chat-input:focus {
    border-color: rgba(232,35,26,0.6);
  }

  .chat-input::placeholder { color: rgba(255,255,255,0.3); }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--red);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--red-dark); }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { background: rgba(232,35,26,0.3); cursor: not-allowed; }

  .send-btn svg { 
    width: 18px; 
    height: 18px; 
    fill: none; 
    stroke: white; 
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    margin-left: 2px;
  }

  /* Menu panel overlay */
  .menu-panel {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: flex-end;
  }

  .menu-panel.open { display: flex; }

  .menu-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }

  .menu-sheet {
    position: relative;
    z-index: 1;
    width: 100%;
    max-height: 75vh;
    background: var(--dark2);
    border-radius: 20px 20px 0 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: sheetUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .menu-sheet-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .menu-sheet-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--yellow);
    letter-spacing: 1px;
  }

  .close-menu-btn {
    width: 30px;
    height: 30px;
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 50%;
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .menu-cats {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .menu-cats::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .cat-btn.active, .cat-btn:hover {
    background: var(--yellow);
    color: var(--dark);
    border-color: var(--yellow);
    font-weight: 700;
  }

  .menu-list {
    overflow-y: auto;
    padding: 8px 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .menu-list::-webkit-scrollbar { width: 3px; }
  .menu-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .menu-item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.2s;
    gap: 10px;
  }

  .menu-item-row:hover { background: rgba(255,255,255,0.08); }

  .menu-item-info { flex: 1; min-width: 0; }
  .menu-item-name {
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .menu-item-desc {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .menu-item-price {
    font-size: 13px;
    font-weight: 700;
    color: var(--yellow);
    white-space: nowrap;
  }

  .stock-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 600;
  }
  .stock-ok { background: rgba(34,197,94,0.15); color: #22c55e; }
  .stock-low { background: rgba(234,179,8,0.15); color: #eab308; }
  .stock-out { background: rgba(239,68,68,0.15); color: #ef4444; }

  /* Scrollbar */
  .chat-area::-webkit-scrollbar { width: 3px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 20px 10px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .empty-subtitle { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 16px; }

  /* Responsive */
  @media (min-width: 481px) {
    .app-wrapper {
      box-shadow: 0 0 80px rgba(232,35,26,0.2), 0 0 0 1px rgba(255,255,255,0.05);
    }
  }

  /* Markdown-like formatting in bubbles */
  .msg-bubble strong { font-weight: 700; }
  .msg-bubble em { font-style: italic; }
</style>
</head>
<body>

<div class="app-wrapper">

  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <div class="brand-row">
        <div class="logo-icon">🍔</div>
        <div>
          <div class="brand-title">Warung Cepat</div>
          <div class="brand-subtitle">Drive Thru Chat</div>
        </div>
      </div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span class="status-text">Miko siap melayani — Buka 24 jam</span>
      </div>
    </div>
  </div>

  <!-- Name bar -->
  <div class="name-bar">
    <label>Nama Kak:</label>
    <input class="name-input" id="customerName" type="text" placeholder="Masukkan nama kamu..." maxlength="30">
    <button class="menu-toggle-btn" onclick="openMenu()">🍽 Menu</button>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🚗</div>
      <div class="empty-title">Selamat Datang!</div>
      <div class="empty-subtitle">Ketik pesananmu atau cek menu dulu ya kak.<br>Miko siap bantuin! 😊</div>
      <div class="quick-chips">
        <span class="chip" onclick="quickSend('Halo, mau lihat menu dong')">📋 Lihat Menu</span>
        <span class="chip" onclick="quickSend('Mau pesan 1 Burger Klasik dan 1 Cola')">🍔 Burger + Cola</span>
        <span class="chip" onclick="quickSend('Ada paket hemat nggak?')">💰 Paket Hemat</span>
        <span class="chip" onclick="quickSend('Rekomendasiin dong pesanan buat makan siang')">✨ Rekomendasiin</span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Ketik pesanan atau tanyain menu..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>

<!-- Menu panel -->
<div class="menu-panel" id="menuPanel">
  <div class="menu-backdrop" onclick="closeMenu()"></div>
  <div class="menu-sheet">
    <div class="menu-sheet-header">
      <span class="menu-sheet-title">📋 Daftar Menu</span>
      <button class="close-menu-btn" onclick="closeMenu()">✕</button>
    </div>
    <div class="menu-cats" id="menuCats">
      <button class="cat-btn active" onclick="filterCat('all', this)">Semua</button>
      <button class="cat-btn" onclick="filterCat('burger', this)">🍔 Burger</button>
      <button class="cat-btn" onclick="filterCat('ayam', this)">🍗 Ayam</button>
      <button class="cat-btn" onclick="filterCat('snack', this)">🍟 Snack</button>
      <button class="cat-btn" onclick="filterCat('minuman', this)">🥤 Minuman</button>
      <button class="cat-btn" onclick="filterCat('paket', this)">📦 Paket</button>
    </div>
    <div class="menu-list" id="menuList">
      <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4)">Loading menu...</div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:8000';
  let messages = [];
  let allMenu = [];
  let isTyping = false;

  // ─── Helpers ───────────────────────────────────

  function formatPrice(n) {
    return 'Rp. ' + n.toString().replace(/\B(?=(\d{3})+(?!\end))/g, '.');
  }

  function formatTime() {
    return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function scrollToBottom() {
    const area = document.getElementById('chatArea');
    setTimeout(() => area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' }), 50);
  }

  function hideEmpty() {
    const e = document.getElementById('emptyState');
    if (e) e.style.display = 'none';
  }

  // ─── Render messages ───────────────────────────

  function appendMessage(role, text, orderInfo = null) {
    hideEmpty();
    const area = document.getElementById('chatArea');
    const name = document.getElementById('customerName').value.trim() || 'Kamu';
    const initial = name[0].toUpperCase();

    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? initial : '🤖';

    const col = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = formatText(text);

    // Order card if order was placed
    if (orderInfo && orderInfo.order_code) {
      const card = buildOrderCard(orderInfo);
      col.appendChild(bubble);
      col.appendChild(card);
    } else {
      col.appendChild(bubble);
    }

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = formatTime();
    col.appendChild(time);

    wrap.appendChild(avatar);
    wrap.appendChild(col);
    area.appendChild(wrap);
    scrollToBottom();
  }

  function formatText(text) {
    // Basic formatting
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  function buildOrderCard(info) {
    const card = document.createElement('div');
    card.className = 'order-card';
    card.innerHTML = `
      <div class="order-card-header">
        <span class="order-badge">✓ Berhasil</span>
        <span class="order-code">${info.order_code}</span>
      </div>
      <div class="order-detail">
        <span>⏱ Estimasi siap</span>
        <span>${info.estimated_time || '10 menit'}</span>
      </div>
      <div class="order-total">
        <span>Total</span>
        <span>${formatPrice(info.total_price)}</span>
      </div>
    `;
    return card;
  }

  function showTyping() {
    if (isTyping) return;
    isTyping = true;
    const area = document.getElementById('chatArea');
    const wrap = document.createElement('div');
    wrap.id = 'typingWrap';
    wrap.className = 'msg bot typing-indicator';
    wrap.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    `;
    area.appendChild(wrap);
    scrollToBottom();
  }

  function hideTyping() {
    isTyping = false;
    const el = document.getElementById('typingWrap');
    if (el) el.remove();
  }

  // ─── Chat logic ────────────────────────────────

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function quickSend(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isTyping) return;

    const customerName = document.getElementById('customerName').value.trim() || 'Pelanggan';

    // Display user message
    appendMessage('user', text);

    // Add to history
    messages.push({ role: 'user', content: text });

    // Clear input
    input.value = '';
    input.style.height = 'auto';

    // Disable send
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: messages,
          customer_name: customerName
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Server error ${res.status}`);
      }

      const data = await res.json();
      hideTyping();

      const reply = data.reply || 'Maaf, ada gangguan teknis.';
      messages.push({ role: 'assistant', content: reply });
      appendMessage('bot', reply, data.order_info);

    } catch (err) {
      hideTyping();
      console.error(err);
      appendMessage('bot', `⚠️ Gagal terhubung ke server. Pastikan backend berjalan di localhost:8000 dan OPENAI_API_KEY sudah di-set.\n\n_Error: ${err.message}_`);
    }

    btn.disabled = false;
    input.focus();
  }

  // ─── Menu Panel ────────────────────────────────

  async function openMenu() {
    document.getElementById('menuPanel').classList.add('open');
    if (allMenu.length === 0) await loadMenu();
    renderMenu('all');
  }

  function closeMenu() {
    document.getElementById('menuPanel').classList.remove('open');
  }

  async function loadMenu() {
    try {
      const res = await fetch(`${API_BASE}/menu`);
      const data = await res.json();
      allMenu = data.menu || [];
    } catch (e) {
      allMenu = [];
    }
  }

  function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMenu(cat);
  }

  function renderMenu(cat) {
    const list = document.getElementById('menuList');
    const filtered = cat === 'all' ? allMenu : allMenu.filter(m => m.category === cat);

    if (!filtered.length) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4)">Menu tidak ditemukan</div>';
      return;
    }

    list.innerHTML = filtered.map(item => {
      let stockClass = 'stock-ok';
      let stockText = `✓ ${item.stock}`;
      if (item.stock === 0) { stockClass = 'stock-out'; stockText = 'Habis'; }
      else if (item.stock <= 3) { stockClass = 'stock-low'; stockText = `⚠ ${item.stock}`; }

      return `<div class="menu-item-row" onclick="orderFromMenu('${item.name.replace(/'/g, "\\'")}')">
        <div class="menu-item-info">
          <div class="menu-item-name">${item.name}</div>
          <div class="menu-item-desc">${item.description || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <div class="menu-item-price">${formatPrice(item.price)}</div>
          <span class="stock-badge ${stockClass}">${stockText}</span>
        </div>
      </div>`;
    }).join('');
  }

  function orderFromMenu(name) {
    closeMenu();
    document.getElementById('chatInput').value = `Mau pesan 1 ${name}`;
    document.getElementById('chatInput').focus();
  }

  // ─── Init ──────────────────────────────────────

  window.addEventListener('load', () => {
    document.getElementById('chatInput').focus();
  });
</script>
</body>
</html>
